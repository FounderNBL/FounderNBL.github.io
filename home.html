<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>New Beansland | Stories. Questions. Worlds.</title>
  <meta name="description" content="New Beansland — stories, questions, worlds, voices, books, and ideas.">
  <meta name="theme-color" content="#020914">
  <link rel="icon" type="image/png" href="nbl-logo.png">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #020914;
    }

    body {
      display: grid;
      place-items: center;
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
    }

    /*
      The entire visible homepage is one image.
      The transparent links below only make the matching image areas clickable.
    */
    .homepage {
      position: relative;
      width: min(100vw, calc(100dvh * 16 / 9));
      max-width: 1536px;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #020914;
      user-select: none;
      -webkit-user-select: none;
    }

    .homepage-image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      z-index: 2;
      border: 0;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
    }

    .hotspot:focus-visible {
      outline: 3px solid #f0c873;
      outline-offset: -3px;
      border-radius: 8px;
    }

    /* Header navigation */
    .home-link      { left: 35.2%; top: 1.8%; width: 5.3%; height: 7.0%; }
    .stories-nav    { left: 41.6%; top: 1.8%; width: 6.5%; height: 7.0%; }
    .questions-nav  { left: 48.4%; top: 1.8%; width: 7.4%; height: 7.0%; }
    .worlds-nav     { left: 56.0%; top: 1.8%; width: 6.3%; height: 7.0%; }
    .voices-nav     { left: 63.5%; top: 1.8%; width: 6.0%; height: 7.0%; }
    .about-nav      { left: 70.2%; top: 1.8%; width: 5.7%; height: 7.0%; }
    .start-here     { left: 88.3%; top: 1.7%; width: 9.7%; height: 7.4%; }

    /* Hero buttons */
    .explore-worlds { left: 3.3%; top: 42.0%; width: 14.2%; height: 6.5%; }
    .read-stories   { left: 18.2%; top: 42.0%; width: 13.4%; height: 6.5%; }

    /* Signpost inside the hero artwork */
    .sign-stories   { left: 84.0%; top: 20.1%; width: 10.4%; height: 5.0%; }
    .sign-questions { left: 83.3%; top: 25.0%; width: 11.2%; height: 5.2%; }
    .sign-worlds    { left: 84.0%; top: 30.1%; width: 10.1%; height: 5.2%; }
    .sign-voices    { left: 84.6%; top: 35.0%; width: 9.4%; height: 5.2%; }

    /* Four large cards */
    .stories-card   { left: 3.1%; top: 50.7%; width: 23.5%; height: 20.8%; }
    .questions-card { left: 27.5%; top: 50.7%; width: 22.6%; height: 20.8%; }
    .worlds-card    { left: 50.7%; top: 50.7%; width: 21.0%; height: 20.8%; }
    .voices-card    { left: 72.5%; top: 50.7%; width: 24.0%; height: 20.8%; }

    /* Featured works */
    .people-zoo     { left: 3.2%; top: 73.0%; width: 27.0%; height: 20.1%; }
    .doctor-test    { left: 30.2%; top: 73.0%; width: 25.5%; height: 20.1%; }
    .usb-book       { left: 55.7%; top: 73.0%; width: 40.8%; height: 20.1%; }

    /* Footer links */
    .privacy        { left: 23.3%; top: 94.0%; width: 7.2%; height: 4.5%; }
    .terms          { left: 31.4%; top: 94.0%; width: 6.7%; height: 4.5%; }
    .disclosure     { left: 39.2%; top: 94.0%; width: 14.3%; height: 4.5%; }
    .copyright      { left: 54.3%; top: 94.0%; width: 7.1%; height: 4.5%; }
    .contact        { left: 61.6%; top: 94.0%; width: 6.5%; height: 4.5%; }

    .facebook       { left: 83.2%; top: 93.7%; width: 2.6%; height: 5.0%; }
    .instagram      { left: 86.5%; top: 93.7%; width: 2.6%; height: 5.0%; }
    .youtube        { left: 90.1%; top: 93.7%; width: 2.6%; height: 5.0%; }
    .x-social       { left: 93.5%; top: 93.7%; width: 2.6%; height: 5.0%; }

    @media (orientation: portrait) {
      .homepage {
        width: 100vw;
        max-width: none;
      }
    }
  </style>
</head>

<body>
  <main class="homepage" aria-label="New Beansland homepage">
    <img
      class="homepage-image"
      src="new-beansland-homepage.png"
      alt="New Beansland homepage with navigation, stories, questions, worlds, voices, and featured books."
    >

    <!-- Header -->
    <a class="hotspot home-link" href="home.html" aria-label="Home"></a>
    <a class="hotspot stories-nav" href="site.html#stories" aria-label="Stories"></a>
    <a class="hotspot questions-nav" href="site.html#frameworks" aria-label="Questions"></a>
    <a class="hotspot worlds-nav" href="site.html#worlds" aria-label="Worlds"></a>
    <a class="hotspot voices-nav" href="site.html#voices" aria-label="Voices"></a>
    <a class="hotspot about-nav" href="site.html#about" aria-label="About"></a>
    <a class="hotspot start-here" href="site.html" aria-label="Start Here"></a>

    <!-- Hero -->
    <a class="hotspot explore-worlds" href="site.html#worlds" aria-label="Explore the Worlds"></a>
    <a class="hotspot read-stories" href="site.html#stories" aria-label="Read the Stories"></a>

    <a class="hotspot sign-stories" href="site.html#stories" aria-label="Stories sign"></a>
    <a class="hotspot sign-questions" href="site.html#frameworks" aria-label="Questions sign"></a>
    <a class="hotspot sign-worlds" href="site.html#worlds" aria-label="Worlds sign"></a>
    <a class="hotspot sign-voices" href="site.html#voices" aria-label="Voices sign"></a>

    <!-- Four cards -->
    <a class="hotspot stories-card" href="site.html#stories" aria-label="Open Stories"></a>
    <a class="hotspot questions-card" href="site.html#frameworks" aria-label="Open Questions"></a>
    <a class="hotspot worlds-card" href="site.html#worlds" aria-label="Open Worlds"></a>
    <a class="hotspot voices-card" href="site.html#voices" aria-label="Open Voices"></a>

    <!-- Featured works -->
    <a class="hotspot people-zoo" href="people-zoo.html" aria-label="Open The People Zoo"></a>
    <a class="hotspot doctor-test" href="doctor-rocketship-test.html" aria-label="Open The Doctor Rocketship Test"></a>
    <a class="hotspot usb-book" href="coming-soon.html" aria-label="Open U.S.B. coming soon"></a>

    <!-- Footer -->
    <a class="hotspot privacy" href="coming-soon.html" aria-label="Privacy Policy"></a>
    <a class="hotspot terms" href="coming-soon.html" aria-label="Terms of Use"></a>
    <a class="hotspot disclosure" href="coming-soon.html" aria-label="AI-Assisted Creative Disclosure"></a>
    <a class="hotspot copyright" href="coming-soon.html" aria-label="Copyright"></a>
    <a class="hotspot contact" href="mailto:foundernewbeansland@gmail.com" aria-label="Contact New Beansland"></a>

    <a class="hotspot facebook" href="coming-soon.html" aria-label="Facebook"></a>
    <a class="hotspot instagram" href="coming-soon.html" aria-label="Instagram"></a>
    <a class="hotspot youtube" href="coming-soon.html" aria-label="YouTube"></a>
    <a class="hotspot x-social" href="coming-soon.html" aria-label="X"></a>
  </main>
</body>
</html>
