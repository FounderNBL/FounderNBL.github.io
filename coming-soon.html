  <style>
    :root {
      --bg0:#030508;
      --bg1:#080d16;

      --cream:#f4ead5;
      --soft:#ded7c7;
      --line:rgba(216,184,106,.34);

    * { box-sizing:border-box; }

    body {
      margin:0;
      min-height:100vh;
      background:radial-gradient(circle at top,var(--bg2) 0%,var(--bg1) 45%,var(--bg0) 100%);

      justify-content:center;
      padding:28px;
      text-align:center;
    }

    .box {
      width:min(760px,100%);
      border:1px solid var(--line);
      border-radius:16px;
      padding:38px clamp(20px,5vw,54px);
      background:rgba(5,9,15,.72);
      box-shadow:0 0 38px rgba(216,184,106,.10);
    }

    img {
      width:min(260px,82%);
      border-radius:10px;
      margin-bottom:22px;
    }

    h1 {
      margin:0 0 12px;
      color:var(--gold);
      font-size:clamp(2.2rem,8vw,4.4rem);
    }

    p {
      color:#e8e3d8;
      line-height:1.7;
      font-size:1.1rem;
    }

    a {
      display:inline-block;
      margin-top:18px;
      padding:12px 16px;
      border-radius:10px;
      border:1px solid var(--gold);
      color:#07101c;
      background:linear-gradient(180deg,#f1d489,#bd9143);
      font-family:Arial,sans-serif;
      font-weight:800;
      text-decoration:none;
